<!DOCTYPE html>
<html lang="en">

<head>
    <!-- PWA i Ikonki -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoachWay - Driver Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <!-- SDK Supabase musi być w head, aby app.js mógł z niego korzystać -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="app-header">
        <div class="header-content">
            <div style="text-align: left;">
                <h1>CoachWay</h1>
                <p id="ui-header-sub"></p>
            </div>

            <div class="lang-dropdown">
                <div id="lang-current" onclick="toggleLangMenu()">🇬🇧</div>
                <div id="lang-menu" class="lang-menu">
                    <div class="lang-option" onclick="changeLang('en')"><span>🇬🇧</span> English</div>
                    <div class="lang-option" onclick="changeLang('pl')"><span>🇵🇱</span> Polski</div>
                </div>
            </div>
        </div>
    </div>

    <div id="search-container">
        <input type="text" id="city-search">
    </div>

    <!-- VIEW: MAIN MENU -->
    <div id="view-main" class="view active">
        <div class="menu-item" onclick="showView('view-regions')">
            <i>🏙️</i>
            <div><b id="ui-menu-brief-title"></b><br><span id="ui-menu-brief-desc"></span></div>
        </div>
        <div class="menu-item" onclick="handlePitStop()">
            <i>⛽</i>
            <div><b id="ui-menu-pit-title"></b><br><span id="ui-menu-pit-desc"></span></div>
        </div>
    </div>

    <!-- VIEW: REGIONS -->
    <div id="view-regions" class="view">
        <button class="back-btn" onclick="showView('view-main')" id="ui-back-main"></button>
        <h2 class="section-title" id="ui-browse-title"></h2>
        <div id="region-list"></div>
    </div>

    <!-- VIEW: CITY LIST -->
    <div id="view-cities" class="view">
        <button class="back-btn" onclick="showView('view-regions')" id="ui-back-reg"></button>
        <h2 id="reg-name" class="section-title"></h2>
        <div id="city-list-container"></div>
    </div>

    <!-- VIEW: BRIEFING -->
    <div id="view-briefing" class="view">
        <button class="back-btn" onclick="closeBriefing()" id="ui-back-brief"></button>
        <h2 id="city-name-display"></h2>
        <p id="ui-op-brief" class="op-brief-label"></p>
        <div id="briefing-steps"></div>
    </div>

    <footer
        style="margin-top: 40px; padding: 20px; text-align: center; border-top: 1px solid #e2e8f0; color: #64748b; font-size: 13px;">
        <p>© 2026 Tomasz Pikniczka | My Production</p>
    </footer>

    <!-- LOGIKA APLIKACJI - KOLEJNOŚĆ JEST KLUCZOWA -->
    <!-- 1. Najpierw konfiguracja (klucze API) -->
    <script src="config.js?v=1.1"></script>

    <!-- 2. Potem tłumaczenia -->
    <script src="lang-en.js?v=1.1"></script>
    <script src="lang-pl.js?v=1.1"></script>

    <!-- 3. Na samym końcu główny kod aplikacji -->
    <script src="app.js?v=1.1"></script>

</body>

</html>
